apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sachin-db
spec:
  serviceName: "redis-service"  
  replicas: 3
  selector:
    matchLabels:
      app: database
  template:
    metadata:
      labels:
        app: database
    spec:
      containers:
      - name: redis-cont
        image: redis:8.8.0
        ports:
        - containerPort: 6379
